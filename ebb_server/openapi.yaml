{
  "components":
    {
      "schemas":
        {
          "Action":
            {
              "properties":
                {
                  "actor_id": { "description": "Actor who created the action", "type": "string" },
                  "hlc":
                    {
                      "description": "Hybrid Logical Clock timestamp",
                      "format": "int64",
                      "type": "integer",
                    },
                  "id": { "description": "Unique action ID", "type": "string" },
                  "updates":
                    {
                      "items":
                        {
                          "properties":
                            {
                              "data":
                                {
                                  "description": "Update payload",
                                  "nullable": true,
                                  "type": "object",
                                },
                              "id":
                                {
                                  "description": "Unique update ID within the action",
                                  "type": "string",
                                },
                              "method":
                                {
                                  "description": "Update method",
                                  "enum": ["put", "patch", "delete"],
                                  "type": "string",
                                },
                              "subject_id":
                                {
                                  "description": "ID of the entity being updated",
                                  "type": "string",
                                },
                              "subject_type":
                                { "description": "Type of the entity", "type": "string" },
                            },
                          "required": ["id", "subject_id", "subject_type", "method"],
                          "type": "object",
                        },
                      "type": "array",
                    },
                },
              "required": ["id", "actor_id", "hlc", "updates"],
              "type": "object",
            },
          "Entity":
            {
              "properties":
                {
                  "created_hlc": { "format": "int64", "type": "integer" },
                  "data":
                    {
                      "description": "Contains `fields` map of FieldValue entries",
                      "type": "object",
                    },
                  "deleted_hlc": { "format": "int64", "nullable": true, "type": "integer" },
                  "id": { "type": "string" },
                  "last_gsn": { "format": "int64", "type": "integer" },
                  "type": { "type": "string" },
                  "updated_hlc": { "format": "int64", "type": "integer" },
                },
              "required": ["id", "type", "data", "created_hlc", "updated_hlc", "last_gsn"],
              "type": "object",
            },
          "Error":
            {
              "properties":
                {
                  "details":
                    {
                      "description": "Human-readable error details",
                      "nullable": true,
                      "type": "string",
                    },
                  "error": { "description": "Error code string", "type": "string" },
                },
              "required": ["error"],
              "type": "object",
            },
          "GroupInfo":
            {
              "properties":
                {
                  "cursor": { "format": "int64", "type": "integer" },
                  "cursor_valid": { "type": "boolean" },
                  "id": { "description": "Group ID", "type": "string" },
                  "permissions": { "items": { "type": "string" }, "type": "array" },
                  "reason": { "nullable": true, "type": "string" },
                },
              "required": ["id", "permissions", "cursor_valid", "cursor"],
              "type": "object",
            },
          "Rejection":
            {
              "properties":
                {
                  "details": { "nullable": true, "type": "string" },
                  "id": { "description": "ID of the rejected action", "type": "string" },
                  "reason": { "description": "Rejection reason code", "type": "string" },
                },
              "required": ["id", "reason"],
              "type": "object",
            },
          "Update":
            {
              "properties":
                {
                  "data": { "description": "Update payload", "nullable": true, "type": "object" },
                  "id": { "description": "Unique update ID within the action", "type": "string" },
                  "method":
                    {
                      "description": "Update method",
                      "enum": ["put", "patch", "delete"],
                      "type": "string",
                    },
                  "subject_id":
                    { "description": "ID of the entity being updated", "type": "string" },
                  "subject_type": { "description": "Type of the entity", "type": "string" },
                },
              "required": ["id", "subject_id", "subject_type", "method"],
              "type": "object",
            },
        },
    },
  "info":
    {
      "description": "A sync server for collaborative applications.",
      "title": "EbbServer Sync API",
      "version": "0.1.0",
    },
  "openapi": "3.1.0",
  "paths":
    {
      "/entities/query":
        {
          "post":
            {
              "description": "Returns a list of entities matching the given type, with optional field filtering and pagination.",
              "operationId": "queryEntities",
              "requestBody":
                {
                  "content":
                    {
                      "application/json":
                        {
                          "schema":
                            {
                              "properties":
                                {
                                  "filter":
                                    {
                                      "description": "Field-value filter",
                                      "nullable": true,
                                      "type": "object",
                                    },
                                  "limit":
                                    {
                                      "description": "Max results to return",
                                      "nullable": true,
                                      "type": "integer",
                                    },
                                  "offset":
                                    {
                                      "description": "Number of results to skip",
                                      "nullable": true,
                                      "type": "integer",
                                    },
                                  "type":
                                    { "description": "Entity type to query", "type": "string" },
                                },
                              "required": ["type"],
                              "type": "object",
                            },
                        },
                    },
                  "required": true,
                },
              "responses":
                {
                  "200":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "items":
                                    {
                                      "properties":
                                        {
                                          "created_hlc": { "format": "int64", "type": "integer" },
                                          "data":
                                            {
                                              "description": "Contains `fields` map of FieldValue entries",
                                              "type": "object",
                                            },
                                          "deleted_hlc":
                                            {
                                              "format": "int64",
                                              "nullable": true,
                                              "type": "integer",
                                            },
                                          "id": { "type": "string" },
                                          "last_gsn": { "format": "int64", "type": "integer" },
                                          "type": { "type": "string" },
                                          "updated_hlc": { "format": "int64", "type": "integer" },
                                        },
                                      "required":
                                        [
                                          "id",
                                          "type",
                                          "data",
                                          "created_hlc",
                                          "updated_hlc",
                                          "last_gsn",
                                        ],
                                      "type": "object",
                                    },
                                  "type": "array",
                                },
                            },
                        },
                      "description": "Matching entities",
                    },
                  "422":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "details":
                                        {
                                          "description": "Human-readable error details",
                                          "nullable": true,
                                          "type": "string",
                                        },
                                      "error":
                                        { "description": "Error code string", "type": "string" },
                                    },
                                  "required": ["error"],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Missing or invalid type, or invalid JSON",
                    },
                  "503":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "details":
                                        {
                                          "description": "Human-readable error details",
                                          "nullable": true,
                                          "type": "string",
                                        },
                                      "error":
                                        { "description": "Error code string", "type": "string" },
                                    },
                                  "required": ["error"],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Query failed",
                    },
                },
              "summary": "Query entities by type",
              "tags": ["Entities"],
            },
        },
      "/entities/{id}":
        {
          "get":
            {
              "description": "Retrieves a single entity by its ID, materialized from the action log.",
              "operationId": "getEntity",
              "parameters":
                [
                  {
                    "description": "The entity ID",
                    "in": "path",
                    "name": "id",
                    "required": true,
                    "schema": { "type": "string" },
                  },
                  {
                    "description": "Actor ID override. Usually provided via x-ebb-actor-id header.",
                    "in": "query",
                    "name": "actor_id",
                    "required": false,
                    "schema": { "type": "string" },
                  },
                ],
              "responses":
                {
                  "200":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "created_hlc": { "format": "int64", "type": "integer" },
                                      "data":
                                        {
                                          "description": "Contains `fields` map of FieldValue entries",
                                          "type": "object",
                                        },
                                      "deleted_hlc":
                                        { "format": "int64", "nullable": true, "type": "integer" },
                                      "id": { "type": "string" },
                                      "last_gsn": { "format": "int64", "type": "integer" },
                                      "type": { "type": "string" },
                                      "updated_hlc": { "format": "int64", "type": "integer" },
                                    },
                                  "required":
                                    [
                                      "id",
                                      "type",
                                      "data",
                                      "created_hlc",
                                      "updated_hlc",
                                      "last_gsn",
                                    ],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Entity found",
                    },
                  "400":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "details":
                                        {
                                          "description": "Human-readable error details",
                                          "nullable": true,
                                          "type": "string",
                                        },
                                      "error":
                                        { "description": "Error code string", "type": "string" },
                                    },
                                  "required": ["error"],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Missing actor_id",
                    },
                  "404":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "details":
                                        {
                                          "description": "Human-readable error details",
                                          "nullable": true,
                                          "type": "string",
                                        },
                                      "error":
                                        { "description": "Error code string", "type": "string" },
                                    },
                                  "required": ["error"],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Entity not found",
                    },
                  "503":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "details":
                                        {
                                          "description": "Human-readable error details",
                                          "nullable": true,
                                          "type": "string",
                                        },
                                      "error":
                                        { "description": "Error code string", "type": "string" },
                                    },
                                  "required": ["error"],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Materialization failed",
                    },
                },
              "summary": "Read an entity by ID",
              "tags": ["Entities"],
            },
        },
      "/sync/actions":
        {
          "post":
            {
              "description": "Accepts a batch of actions for validation, authorization, and persistence. Actions are processed atomically.",
              "operationId": "writeActions",
              "requestBody":
                {
                  "content":
                    {
                      "application/msgpack":
                        {
                          "schema":
                            {
                              "properties":
                                {
                                  "actions":
                                    {
                                      "items":
                                        {
                                          "properties":
                                            {
                                              "actor_id":
                                                {
                                                  "description": "Actor who created the action",
                                                  "type": "string",
                                                },
                                              "hlc":
                                                {
                                                  "description": "Hybrid Logical Clock timestamp",
                                                  "format": "int64",
                                                  "type": "integer",
                                                },
                                              "id":
                                                {
                                                  "description": "Unique action ID",
                                                  "type": "string",
                                                },
                                              "updates":
                                                {
                                                  "items":
                                                    {
                                                      "properties":
                                                        {
                                                          "data":
                                                            {
                                                              "description": "Update payload",
                                                              "nullable": true,
                                                              "type": "object",
                                                            },
                                                          "id":
                                                            {
                                                              "description": "Unique update ID within the action",
                                                              "type": "string",
                                                            },
                                                          "method":
                                                            {
                                                              "description": "Update method",
                                                              "enum": ["put", "patch", "delete"],
                                                              "type": "string",
                                                            },
                                                          "subject_id":
                                                            {
                                                              "description": "ID of the entity being updated",
                                                              "type": "string",
                                                            },
                                                          "subject_type":
                                                            {
                                                              "description": "Type of the entity",
                                                              "type": "string",
                                                            },
                                                        },
                                                      "required":
                                                        [
                                                          "id",
                                                          "subject_id",
                                                          "subject_type",
                                                          "method",
                                                        ],
                                                      "type": "object",
                                                    },
                                                  "type": "array",
                                                },
                                            },
                                          "required": ["id", "actor_id", "hlc", "updates"],
                                          "type": "object",
                                        },
                                      "type": "array",
                                    },
                                },
                              "required": ["actions"],
                              "type": "object",
                            },
                        },
                    },
                  "required": true,
                },
              "responses":
                {
                  "200":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "rejected":
                                        {
                                          "items":
                                            {
                                              "properties":
                                                {
                                                  "details": { "nullable": true, "type": "string" },
                                                  "id":
                                                    {
                                                      "description": "ID of the rejected action",
                                                      "type": "string",
                                                    },
                                                  "reason":
                                                    {
                                                      "description": "Rejection reason code",
                                                      "type": "string",
                                                    },
                                                },
                                              "required": ["id", "reason"],
                                              "type": "object",
                                            },
                                          "type": "array",
                                        },
                                    },
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Actions processed (some may be rejected)",
                    },
                  "422":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "details":
                                        {
                                          "description": "Human-readable error details",
                                          "nullable": true,
                                          "type": "string",
                                        },
                                      "error":
                                        { "description": "Error code string", "type": "string" },
                                    },
                                  "required": ["error"],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Invalid MessagePack or missing/invalid structure",
                    },
                  "503":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "details":
                                        {
                                          "description": "Human-readable error details",
                                          "nullable": true,
                                          "type": "string",
                                        },
                                      "error":
                                        { "description": "Error code string", "type": "string" },
                                    },
                                  "required": ["error"],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Write operation failed",
                    },
                },
              "summary": "Write actions to the system",
              "tags": ["Sync"],
            },
        },
      "/sync/groups/{group_id}":
        {
          "get":
            {
              "description": "Returns a paginated list of actions for a group since a given GSN offset.",
              "operationId": "catchUpGroup",
              "parameters":
                [
                  {
                    "description": "The group ID to catch up",
                    "in": "path",
                    "name": "group_id",
                    "required": true,
                    "schema": { "type": "string" },
                  },
                  {
                    "description": "GSN offset to start from",
                    "in": "query",
                    "name": "offset",
                    "required": false,
                    "schema": { "default": "0", "type": "string" },
                  },
                ],
              "responses":
                {
                  "200":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "items":
                                    {
                                      "properties":
                                        {
                                          "actor_id":
                                            {
                                              "description": "Actor who created the action",
                                              "type": "string",
                                            },
                                          "hlc":
                                            {
                                              "description": "Hybrid Logical Clock timestamp",
                                              "format": "int64",
                                              "type": "integer",
                                            },
                                          "id":
                                            { "description": "Unique action ID", "type": "string" },
                                          "updates":
                                            {
                                              "items":
                                                {
                                                  "properties":
                                                    {
                                                      "data":
                                                        {
                                                          "description": "Update payload",
                                                          "nullable": true,
                                                          "type": "object",
                                                        },
                                                      "id":
                                                        {
                                                          "description": "Unique update ID within the action",
                                                          "type": "string",
                                                        },
                                                      "method":
                                                        {
                                                          "description": "Update method",
                                                          "enum": ["put", "patch", "delete"],
                                                          "type": "string",
                                                        },
                                                      "subject_id":
                                                        {
                                                          "description": "ID of the entity being updated",
                                                          "type": "string",
                                                        },
                                                      "subject_type":
                                                        {
                                                          "description": "Type of the entity",
                                                          "type": "string",
                                                        },
                                                    },
                                                  "required":
                                                    ["id", "subject_id", "subject_type", "method"],
                                                  "type": "object",
                                                },
                                              "type": "array",
                                            },
                                        },
                                      "required": ["id", "actor_id", "hlc", "updates"],
                                      "type": "object",
                                    },
                                  "type": "array",
                                },
                            },
                        },
                      "description": "Action list (may be empty)",
                      "headers":
                        {
                          "stream-next-offset":
                            {
                              "description": "Next GSN offset for pagination. Omitted if no more results.",
                              "schema": { "type": "string" },
                            },
                          "stream-up-to-date":
                            {
                              "description": '"true" if client has caught up to watermark',
                              "schema": { "type": "string" },
                            },
                        },
                    },
                  "400":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "details":
                                        {
                                          "description": "Human-readable error details",
                                          "nullable": true,
                                          "type": "string",
                                        },
                                      "error":
                                        { "description": "Error code string", "type": "string" },
                                    },
                                  "required": ["error"],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Invalid offset",
                    },
                  "403":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "details":
                                        {
                                          "description": "Human-readable error details",
                                          "nullable": true,
                                          "type": "string",
                                        },
                                      "error":
                                        { "description": "Error code string", "type": "string" },
                                    },
                                  "required": ["error"],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Not a member of the group",
                    },
                },
              "summary": "Catch-up for a group",
              "tags": ["Sync"],
            },
        },
      "/sync/handshake":
        {
          "post":
            {
              "description": "Called by clients on connection to obtain their actor ID and group membership information.",
              "operationId": "handshake",
              "requestBody":
                {
                  "content":
                    {
                      "application/json":
                        {
                          "schema":
                            {
                              "properties":
                                {
                                  "cursors":
                                    {
                                      "additionalProperties":
                                        { "format": "int64", "type": "integer" },
                                      "description": "Map of group_id to cursor GSN",
                                      "nullable": true,
                                      "type": "object",
                                    },
                                  "schema_version":
                                    {
                                      "description": "Client schema version",
                                      "nullable": true,
                                      "type": "integer",
                                    },
                                },
                              "type": "object",
                            },
                        },
                    },
                  "required": true,
                },
              "responses":
                {
                  "200":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "actor_id": { "type": "string" },
                                      "groups":
                                        {
                                          "items":
                                            {
                                              "properties":
                                                {
                                                  "cursor":
                                                    { "format": "int64", "type": "integer" },
                                                  "cursor_valid": { "type": "boolean" },
                                                  "id":
                                                    { "description": "Group ID", "type": "string" },
                                                  "permissions":
                                                    {
                                                      "items": { "type": "string" },
                                                      "type": "array",
                                                    },
                                                  "reason": { "nullable": true, "type": "string" },
                                                },
                                              "required":
                                                ["id", "permissions", "cursor_valid", "cursor"],
                                              "type": "object",
                                            },
                                          "type": "array",
                                        },
                                    },
                                  "required": ["actor_id", "groups"],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Handshake successful",
                    },
                  "401":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "details":
                                        {
                                          "description": "Human-readable error details",
                                          "nullable": true,
                                          "type": "string",
                                        },
                                      "error":
                                        { "description": "Error code string", "type": "string" },
                                    },
                                  "required": ["error"],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Missing actor_id",
                    },
                  "422":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "details":
                                        {
                                          "description": "Human-readable error details",
                                          "nullable": true,
                                          "type": "string",
                                        },
                                      "error":
                                        { "description": "Error code string", "type": "string" },
                                    },
                                  "required": ["error"],
                                  "type": "object",
                                },
                            },
                        },
                      "description": "Invalid JSON body",
                    },
                },
              "summary": "Initialize connection and get group membership",
              "tags": ["Sync"],
            },
        },
      "/sync/live":
        {
          "get":
            {
              "description": "Opens a Server-Sent Events stream delivering action events, control events, and presence updates.",
              "operationId": "liveUpdates",
              "parameters":
                [
                  {
                    "description": "Comma-separated group IDs to subscribe to",
                    "in": "query",
                    "name": "groups",
                    "required": true,
                    "schema": { "type": "string" },
                  },
                  {
                    "description": "GSN cursor to resume from",
                    "in": "query",
                    "name": "cursor",
                    "required": false,
                    "schema": { "default": "0", "type": "string" },
                  },
                ],
              "responses":
                {
                  "200":
                    {
                      "content":
                        {
                          "text/event-stream":
                            {
                              "schema": { "description": "Raw SSE data payload", "type": "string" },
                            },
                        },
                      "description": "SSE stream established",
                    },
                  "400":
                    {
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "properties":
                                    {
                                      "details":
