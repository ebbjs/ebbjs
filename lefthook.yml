pre-commit:
  runner: bash
  commands:
    typescript-lint:
      glob: "**/*.{ts,tsx}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    typescript-fmt:
      glob: "**/*.{ts,tsx}"
      run: pnpm exec oxfmt --write {staged_files}
      stage_fixed: true
    elixir-format:
      root: ebb_server
      glob: "lib/** test/** *.exs .formatter.exs config/*.exs"
      run: mix format --check-formatted
    elixir-credo:
      root: ebb_server
      glob: "lib/** test/**"
      run: mix credo --strict
    elixir-test:
      root: ebb_server
      glob: "lib/** test/**"
      run: mix test