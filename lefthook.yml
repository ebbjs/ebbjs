pre-commit:
  jobs:
    - name: typescript-lint
      glob: "**/*.{ts,tsx}"
      run: oxlint --fix {staged_files}
      stage_fixed: true
    - name: typescript-fmt
      glob: "**/*.{ts,tsx}"
      run: oxfmt --write {staged_files}
      stage_fixed: true
    - name: elixir-format
      root: ebb_server
      glob: "lib/** test/** *.exs .formatter.exs config/*.exs"
      run: mix format --check-formatted
    - name: elixir-credo
      root: ebb_server
      glob: "lib/** test/**"
      run: mix credo --strict
    - name: elixir-test
      root: ebb_server
      glob: "lib/** test/**"
      run: mix test
