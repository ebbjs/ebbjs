---
name: CI (TypeScript)

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "*.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - "vitest.config.*"
      - ".eslintrc*"
      - ".prettierrc*"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "*.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - "vitest.config.*"
      - ".eslintrc*"
      - ".prettierrc*"
      - "pnpm-lock.yaml"

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm fmt:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Download ebb_server release
        run: |
          mkdir -p packages/server/dist
          if ! gh release download ${{ vars.ELIXIR_VERSION || '0.1.0' }} -R ebbjs/ebbjs -p ebb_server.tar.gz 2>/dev/null; then
            echo "Error: ebb-server-${{ vars.ELIXIR_VERSION || '0.1.0' }} release not found. Run Elixir CI first to build the release."
            exit 1
          fi
          tar -xzf ebb_server.tar.gz -C packages/server/dist
          rm ebb_server.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm build
      - run: pnpm --recursive exec vitest --run --passWithNoTests
