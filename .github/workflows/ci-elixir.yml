---
name: CI (Elixir)

on:
  push:
    branches: [main]
    paths:
      - "ebb_server/**"
  pull_request:
    branches: [main]
    paths:
      - "ebb_server/**"

jobs:
  ci:
    name: ${{ matrix.job }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - job: Format Check
            command: mix format --check-formatted
          - job: Lint (Credo)
            command: mix credo --strict --files-excluded "test/**"
          - job: Test
            command: mix test
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libsnappy-dev libsqlite3-dev libz-dev libbz2-dev liblz4-dev libzstd-dev
      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            ebb_server/deps
            ebb_server/_build
            ~/.mix
            ~/.hex
          key: mix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('ebb_server/mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache rocksdb build
        uses: actions/cache@v4
        with:
          path: ebb_server/deps/rocksdb/_build
          key: rocksdb-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('ebb_server/mix.lock') }}-${{ hashFiles('ebb_server/deps/rocksdb/rebar.config') }}
          restore-keys: |
            rocksdb-${{ runner.os }}-${{ runner.arch }}-
      - name: Fix CMake cache for architecture
        run: rm -f ebb_server/deps/rocksdb/_build/cmake/CMakeCache.txt
        working-directory: ebb_server
      - name: Install Hex and Rebar
        run: mix local.hex --force && mix local.rebar --force
        working-directory: ebb_server
      - name: Install dependencies
        run: mix deps.get
        working-directory: ebb_server
      - name: ${{ matrix.job }}
        run: ${{ matrix.command }}
        working-directory: ebb_server

  create-release:
    name: Create Release
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libsnappy-dev libsqlite3-dev libz-dev libbz2-dev liblz4-dev libzstd-dev
      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            ebb_server/deps
            ebb_server/_build
          key: mix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('ebb_server/mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache rocksdb build
        uses: actions/cache@v4
        with:
          path: ebb_server/deps/rocksdb/_build
          key: rocksdb-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('ebb_server/mix.lock') }}-${{ hashFiles('ebb_server/deps/rocksdb/rebar.config') }}
          restore-keys: |
            rocksdb-${{ runner.os }}-${{ runner.arch }}-
      - name: Fix CMake cache for architecture
        run: rm -f ebb_server/deps/rocksdb/_build/cmake/CMakeCache.txt
        working-directory: ebb_server
      - name: Install Hex and Rebar
        run: mix local.hex --force && mix local.rebar --force
        working-directory: ebb_server
      - name: Install dependencies
        run: mix deps.get
        working-directory: ebb_server
      - name: Get version
        id: version
        run: echo "VERSION=$(cd ebb_server && mix run -e 'IO.puts(Mix.Project.config()[:version])' 2>/dev/null)" >> $GITHUB_OUTPUT
      - name: Build release
        run: MIX_ENV=prod mix release
        working-directory: ebb_server
      - name: Create GitHub Release
        run: |
          cd ebb_server/_build/prod/rel
          tar -czf ebb_server.tar.gz ebb_server
          gh release view ${{ steps.version.outputs.VERSION }} --repo ebbjs/ebbjs \
            && gh release upload ${{ steps.version.outputs.VERSION }} ebb_server.tar.gz --repo ebbjs/ebbjs --clobber \
            || gh release create ${{ steps.version.outputs.VERSION }} ebb_server.tar.gz --repo ebbjs/ebbjs -d
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
