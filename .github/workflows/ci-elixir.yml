---
name: CI (Elixir)

on:
  push:
    branches: [main]
    paths:
      - ebb_server/**
  pull_request:
    branches: [main]
    paths:
      - ebb_server/**

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"
      - run: mix format --check-formatted
        working-directory: ebb_server

  lint:
    name: Lint (Credo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"
      - run: mix deps.get
        working-directory: ebb_server
      - run: mix credo --strict
        working-directory: ebb_server

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"
      - name: Install native dependencies for rocksdb and exqlite
        run: sudo apt-get update && sudo apt-get install -y cmake libsnappy-dev libsqlite3-dev libz-dev libbz2-dev liblz4-dev libzstd-dev
      - run: mix deps.get
        working-directory: ebb_server
      - run: mix test
        working-directory: ebb_server
