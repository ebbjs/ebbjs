---
name: CI (Elixir)

on:
  push:
    branches: [main]
    paths:
      - ebb_server/**
  pull_request:
    branches: [main]
    paths:
      - ebb_server/**

jobs:
  ci:
    name: ${{ matrix.job }}
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository }}/elixir:latest
    strategy:
      matrix:
        include:
          - job: Format Check
            command: mix format --check-formatted
          - job: Lint (Credo)
            command: mix credo --strict
          - job: Test
            command: mix test
    steps:
      - uses: actions/checkout@v4
      - name: Configure git safe directory
        run: git config --global --add safe.directory /__w/ebbjs/ebbjs
      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            ebb_server/deps
            ebb_server/_build
            ~/.mix
            ~/.hex
          key: mix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('ebb_server/mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache rocksdb build
        uses: actions/cache@v4
        with:
          path: ebb_server/deps/rocksdb/_build
          key: rocksdb-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('ebb_server/mix.lock') }}-${{ hashFiles('ebb_server/deps/rocksdb/rebar.config') }}
          restore-keys: |
            rocksdb-${{ runner.os }}-${{ runner.arch }}-
      - name: Fix CMake cache for architecture
        run: rm -f ebb_server/deps/rocksdb/_build/cmake/CMakeCache.txt
        working-directory: ebb_server
      - name: Install Hex and Rebar
        run: mix local.hex --force && mix local.rebar --force
        working-directory: ebb_server
      - name: Install dependencies
        run: mix deps.get
        working-directory: ebb_server
      - name: ${{ matrix.job }}
        run: ${{ matrix.command }}
        working-directory: ebb_server
